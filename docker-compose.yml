services:
  nginx-gateway:
    image: nginx:alpine
    container_name: nginx_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gui-service
      - classification-service
      - explainability-service
      - history-service

  classification-service:
    build: ./classification_service
    container_name: brc_classification
    volumes:
      - ./resnet:/app/resnet:ro

  explainability-service:
    build: ./explainability_service
    container_name: brc_explainability
    volumes:
      - ./resnet:/app/resnet:ro

  history-service:
    build: ./history_service
    container_name: brc_historic
    volumes:
      - diagnoses:/app/data

  gui-service:
    build: ./gui_service
    container_name: brc_user_interface
    depends_on:
      - classification-service
      - explainability-service
      - history-service

volumes:
  diagnoses: