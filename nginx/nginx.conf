server {
    listen 80;

    location / {
        proxy_pass http://gui-service:7860;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/classification/ {
        proxy_pass http://classification-service:8000/;
        proxy_set_header Host $host;
    }

    location /api/explainability/ {
        proxy_pass http://explainability-service:8000/;
        proxy_set_header Host $host;
    }

    location /api/history/ {
        proxy_pass http://history-service:8000/;
        proxy_set_header Host $host;
    }
}